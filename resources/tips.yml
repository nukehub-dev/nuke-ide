# NukeIDE Loading Screen Tips
# Edit this file to customize the tips shown during startup

settings:
  # How long each tip displays (in milliseconds)
  tipDuration: 8000

# Tips are shown randomly during the loading screen
tips:
  # Productivity Tips
  - text: Use keyboard shortcuts to speed up development! Try Ctrl+P for quick file navigation.
    category: productivity
    icon: ⌨️

  - text: Save your work frequently. Auto-save can be enabled in preferences.
    category: productivity
    icon: 💾

  - text: Break complex problems into smaller, manageable tasks.
    category: productivity
    icon: 🧩

  - text: Automate your workflows using Python scripts for efficiency.
    category: productivity
    icon: 🐍

  # Health & Wellness
  - text: Dark mode helps reduce eye strain during long coding sessions.
    category: health
    icon: 👁️

  - text: Take regular breaks to stay productive and avoid burnout.
    category: health
    icon: ☕

  # Best Practices
  - text: Keep your code clean and well-commented for better readability.
    category: best-practice
    icon: ✨

  - text: Use version control to track changes and collaborate with others.
    category: best-practice
    icon: 🌿

  - text: Test your code before committing to ensure it works as intended.
    category: best-practice
    icon: 🧪

  - text: Document your code to make it easier to understand and maintain.
    category: best-practice
    icon: 📝

  # Debugging
  - text: Use debugging tools to find and fix issues in your code quickly.
    category: debugging
    icon: 🐛

