  - text: OpenMC can be used for Monte Carlo neutron transport simulations.
    category: nuclear
    icon: ⚛️

  - text: DAGMC allows detailed geometry modeling for nuclear simulations.
    category: nuclear
    icon: 🔷

  - text: PyNE provides essential nuclear data manipulation tools.
    category: nuclear
    icon: 🧬

  - text: MOOSE framework is powerful for multiphysics simulations.
    category: nuclear
    icon: 🦌

  - text: Proper meshing is crucial for accurate reactor simulations.
    category: nuclear
    icon: 🔲

  - text: Validate your nuclear models against experimental data.
    category: nuclear
    icon: ✅

  - text: Use nuclear data libraries like ENDF for accurate calculations.
    category: nuclear
    icon: 📚

  # Performance
  - text: Parallel computing can significantly speed up simulations.
    category: performance
    icon: 🚀

  - text: Use Cardinal's parallel meshes to scale simulations on HPC systems.
    category: performance
    icon: 💻

  # Cardinal Specific
  - text: Cardinal integrates high-res thermal-hydraulics and radiation feedback.
    category: nuclear
    icon: 🔥

  - text: Cardinal couples NekRS and OpenMC to MOOSE for multiphysics.
    category: nuclear
    icon: 🔗

  # Paramak
  - text: Paramak enables easy, parameter-driven Tokamak neutronics models.
    category: nuclear
    icon: 🌀
