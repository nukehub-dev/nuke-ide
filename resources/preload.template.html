    <script>
      // Theme detection from nuke-theme localStorage with colors
      function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '243, 117, 36';
      }
      function setSvgFill(element, color) {
        if (element) {
          element.style.fill = color;
          const children = element.querySelectorAll('*');
          children.forEach(child => child.style.fill = color);
        }
      }
      (function() {
        try {
          const storedTheme = localStorage.getItem('nuke-theme');
          if (storedTheme) {
            const theme = JSON.parse(storedTheme);
            const isLight = theme.id === 'nukeide-light';
            const accent = isLight ? theme.accentLight : theme.accentDark;
            const background = isLight ? theme.backgroundLight : theme.backgroundDark;
            const accentRgb = isLight ? (theme.accentLightRgb || hexToRgb(accent)) : (theme.accentDarkRgb || hexToRgb(accent));
            document.body.classList.add(isLight ? 'nukeide-light' : 'nukeide-dark');
            // Apply theme colors as CSS custom properties
            document.body.style.setProperty('--theme-accent-rgb', accentRgb);
            document.body.style.setProperty('--theme-accent', accent);
            document.body.style.setProperty('--theme-accent-light', isLight ? (theme.accentLightLight || '#ff9500') : (theme.accentDarkLight || '#ff9500'));
            document.body.style.setProperty('--theme-accent-dark', isLight ? (theme.accentLightDark || '#f5a623') : (theme.accentDarkDark || '#f5a623'));
            document.body.style.setProperty('--theme-accent-glow', `rgba(${accentRgb}, 0.5)`);
            document.body.style.setProperty('--theme-background-rgb', isLight ? (theme.backgroundLightRgb || '255, 255, 255') : (theme.backgroundDarkRgb || '30, 30, 30'));
            document.body.style.setProperty('--theme-background', background);
            document.body.style.setProperty('--theme-foreground', isLight ? theme.foregroundLight : theme.foregroundDark);
            document.body.style.setProperty('--theme-foreground-inverse', isLight ? theme.foregroundInverseLight : theme.foregroundInverseDark);
            document.body.style.setProperty('--theme-description', isLight ? '#5a6c7d' : '#9ca3af');
            // Theme SVG logo
            setSvgFill(document.querySelector('.custom-spinner svg'), accent);
          } else {
            // CSS :root defaults will apply - add dark class for light theme override
            document.body.classList.add('nukeide-dark');
          }
        } catch (e) {
          console.error('[preload] Theme error:', e.message);
          // CSS :root defaults will apply
        }
      })();
    </script>

      <div class="app-name">{{PRODUCT_NAME}}</div>

      <div class="progress-container">
        <div class="progress-track">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-info">
          <span class="loading-status" id="loading-status">Initializing...</span>
          <span class="progress-text" id="progress-text">0%</span>
        </div>
      </div>
    </div>

    <div class="tip-container" id="tip-box">
      <div class="tip-label">
        <svg class="tip-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
        </svg>
        Pro Tip
      </div>
      <div id="tip-content">Click anywhere to see another tip</div>
    </div>

    <script>
      if (document.head) {
        let link = document.createElement("link");
        link.rel = "icon";
        link.type = "image/svg+xml";
        link.href = "logo.svg";
        document.head.appendChild(link);
      }

      const loadingStages = [
        { percent: 0, status: "Initializing core..." },
        { percent: 15, status: "Loading modules..." },
        { percent: 30, status: "Setting up workspace..." },
        { percent: 45, status: "Loading extensions..." },
        { percent: 60, status: "Configuring plugins..." },
        { percent: 75, status: "Preparing UI..." },
        { percent: 90, status: "Almost ready..." },
        { percent: 100, status: "Ready!" }
      ];

      const tips = {{TIPS_ARRAY}};
      const TIP_DURATION = {{TIP_DURATION}};

      let currentStage = 0;
      let currentTipIndex = Math.floor(Math.random() * tips.length);

      function updateProgress() {
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const loadingStatus = document.getElementById('loading-status');

        if (currentStage < loadingStages.length) {
          const stage = loadingStages[currentStage];
          progressFill.style.width = stage.percent + '%';
          progressText.textContent = stage.percent + '%';
          loadingStatus.textContent = stage.status;
          currentStage++;

          const delay = Math.random() * 500 + 250;
          setTimeout(updateProgress, delay);
        }
      }

      function updateTip() {
        const tipContent = document.getElementById('tip-content');
        if (!tipContent) return;
        
        currentTipIndex = (currentTipIndex + 1) % tips.length;
        
        tipContent.style.opacity = '0';
        tipContent.style.transition = 'opacity 0.3s ease';
        
        setTimeout(() => {
          if (tipContent) {
            tipContent.textContent = tips[currentTipIndex];
            tipContent.style.opacity = '1';
          }
        }, 300);
      }

      document.addEventListener('DOMContentLoaded', () => {
        const tipContent = document.getElementById('tip-content');
        if (tipContent && tips.length > 0) {
          tipContent.textContent = tips[currentTipIndex];
        }
        
        setTimeout(updateProgress, 500);
        setInterval(updateTip, TIP_DURATION);
        document.addEventListener('click', updateTip);
        
        setTimeout(() => {
          const spinnerContainer = document.querySelector('.spinner-container');
          const tipBox = document.getElementById('tip-box');
          const bgPattern = document.querySelector('.bg-pattern');
          
          if (spinnerContainer) {
            spinnerContainer.style.opacity = '0';
            spinnerContainer.style.transition = 'opacity 0.5s ease';
            spinnerContainer.style.pointerEvents = 'none';
            setTimeout(() => { spinnerContainer.style.display = 'none'; }, 500);
          }
          if (tipBox) {
            tipBox.style.opacity = '0';
            tipBox.style.transition = 'opacity 0.3s ease';
            setTimeout(() => { tipBox.style.display = 'none'; }, 300);
          }
          if (bgPattern) bgPattern.style.display = 'none';
        }, 15000);
      });
    </script>
  </body>
