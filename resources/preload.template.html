    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        background: #1e1e1e;
        color: #e8e8e8;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      }

      /* Light theme support */
      body.nukeide-light {
        background: #ffffff;
        color: #2c3e50;
      }

      body.nukeide-light .loading-status,
      body.nukeide-light .loading-status {
        color: #5a6c7d;
      }

      body.nukeide-light .progress-text {
        color: #7f8c8d;
      }

      body.nukeide-light .tip-container {
        color: #5a6c7d;
        background: rgba(0, 0, 0, 0.05);
        border-left-color: #f37524;
      }

      .spinner-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        position: relative;
      }

      /* Logo Container */
      .logo-wrapper {
        position: relative;
        width: 180px;
        height: 180px;
        margin-bottom: 40px;
      }

      /* Animated rings behind logo */
      .logo-wrapper::before,
      .logo-wrapper::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        border: 2px solid rgba(243, 117, 36, 0.3);
        animation: pulse-ring 1s ease-out infinite;
      }

      .logo-wrapper::after {
        width: 220px;
        height: 220px;
        animation-delay: 0.4s;
      }

      @keyframes pulse-ring {
        0% {
          transform: translate(-50%, -50%) scale(0.8);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(1.3);
          opacity: 0;
        }
      }

      .custom-spinner svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 4px 20px rgba(243, 117, 36, 0.4));
        animation: logo-spinner 4s infinite ease;
      }
      @keyframes logo-spinner {
        0% {
          transform: rotate(0deg);
        }
        5% {
          transform: rotate(0deg);
        }
        20% {
          transform: rotate(120deg);
        }
        25% {
          transform: rotate(90deg);
        }
        30% {
          transform: rotate(90deg);
        }
        45% {
          transform: rotate(210deg);
        }
        50% {
          transform: rotate(180deg);
        }
        55% {
          transform: rotate(180deg);
        }
        70% {
          transform: rotate(300deg);
        }
        75% {
          transform: rotate(270deg);
        }
        80% {
          transform: rotate(270deg);
        }
        95% {
          transform: rotate(390deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* App Name */
      .app-name {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: 2px;
        margin-bottom: 10px;
        background: linear-gradient(90deg, #f37524, #f5a623);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .app-subtitle {
        font-size: 1rem;
        color: #8b9dc3;
        margin-bottom: 40px;
        letter-spacing: 1px;
      }

      body.nukeide-light .app-subtitle {
        color: #6c7a89;
      }

      /* Progress Container */
      .progress-container {
        width: 400px;
        max-width: 80vw;
        margin-bottom: 20px;
      }

      /* Progress Bar Background */
      .progress-bar-bg {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }

      body.nukeide-light .progress-bar-bg {
        background: rgba(0, 0, 0, 0.1);
      }

      /* Progress Bar Fill */
      .progress-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #f37524, #f5a623);
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      /* Progress Text */
      .progress-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
        font-size: 0.85rem;
      }

      .loading-status {
        color: #8b9dc3;
        font-weight: 500;
      }

      body.nukeide-light .loading-status {
        color: #5a6c7d;
      }

      .progress-text {
        color: #f37524;
        font-weight: 600;
        font-family: 'Consolas', 'Monaco', monospace;
      }

      /* Tip Container */
      .tip-container {
        position: absolute;
        bottom: 8%;
        left: 50%;
        transform: translateX(-50%);
        max-width: 600px;
        width: 90%;
        padding: 16px 24px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        border-left: 3px solid #f37524;
        font-size: 0.9rem;
        color: #b8c5d6;
        text-align: left;
        line-height: 1.5;
        opacity: 0;
        animation: fade-in-up 0.5s ease forwards;
        animation-delay: 0.5s;
      }

      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      .tip-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #f37524;
        margin-bottom: 6px;
        font-weight: 600;
      }

      /* Version badge */
      .version-badge {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 6px 12px;
        background: rgba(243, 117, 36, 0.2);
        border: 1px solid rgba(243, 117, 36, 0.4);
        border-radius: 20px;
        font-size: 0.75rem;
        color: #f37524;
        font-weight: 600;
        letter-spacing: 1px;
        text-decoration: none;
        transition: all 0.2s ease;
        cursor: pointer;
        z-index: 1000;
      }

      .version-badge:hover,
      .version-badge:active,
      .version-badge:visited {
        background: rgba(243, 117, 36, 0.35);
        border-color: rgba(243, 117, 36, 0.6);
        transform: translateY(-1px);
        color: #f37524;
      }

      body.nukeide-light .version-badge {
        background: rgba(243, 117, 36, 0.1);
        border-color: rgba(243, 117, 36, 0.3);
      }

      body.nukeide-light .version-badge:hover,
      body.nukeide-light .version-badge:active,
      body.nukeide-light .version-badge:visited {
        background: rgba(243, 117, 36, 0.2);
        border-color: rgba(243, 117, 36, 0.5);
        color: #f37524;
      }

      /* Ensure container maintains background during fade-out */
      .spinner-container {
        background: #1e1e1e;
      }
      
      body.nukeide-light .spinner-container,
      body.theia-light .spinner-container,
      body.light-theia .spinner-container {
        background: #ffffff;
      }

      /* Hide any default Theia spinners */
      .theia-preload::after,
      .theia-preload::before,
      .theia-loading {
        display: none !important;
        content: none !important;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .logo-wrapper {
          width: 140px;
          height: 140px;
        }

        .app-name {
          font-size: 1.8rem;
        }

        .app-subtitle {
          font-size: 0.8rem;
        }

        .progress-container {
          width: 300px;
        }

        .tip-container {
          font-size: 0.8rem;
          padding: 12px 16px;
        }
      }
    </style>

      // Early theme detection to prevent flash of wrong theme
      (function() {
        try {
          const storedTheme = localStorage.getItem('nuke-theme');
          if (storedTheme) {
            const theme = JSON.parse(storedTheme);
            if (theme.id === 'nukeide-light' || theme.id === 'light' || theme.id === 'light-theia') {
              document.body.classList.add('nukeide-light');
            } else {
              document.body.classList.add('nukeide-dark');
            }
          } else {
            // Default to dark if no theme stored
            document.body.classList.add('nukeide-dark');
          }
        } catch (e) {
          // Fallback to dark theme
          document.body.classList.add('nukeide-dark');
        }
      })();
    </script>

    <script>
      if (document.head) {
        let link = document.createElement("link");
        link.rel = "icon";
        link.type = "image/svg+xml";
        link.href = "logo.svg";
        document.head.appendChild(link);
      }

      const loadingStages = [
        { percent: 0, status: "Initializing core..." },
        { percent: 15, status: "Loading modules..." },
        { percent: 30, status: "Setting up workspace..." },
        { percent: 45, status: "Loading extensions..." },
        { percent: 60, status: "Configuring plugins..." },
        { percent: 75, status: "Preparing UI..." },
        { percent: 90, status: "Almost ready..." },
        { percent: 100, status: "Ready!" }
      ];

      const tips = {{TIPS_ARRAY}};
      const TIP_DURATION = {{TIP_DURATION}};

      let currentStage = 0;
      let currentTipIndex = Math.floor(Math.random() * tips.length);

      function updateProgress() {
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const loadingStatus = document.getElementById('loading-status');

        if (currentStage < loadingStages.length) {
          const stage = loadingStages[currentStage];
          progressFill.style.width = stage.percent + '%';
          progressText.textContent = stage.percent + '%';
          loadingStatus.textContent = stage.status;
          currentStage++;

          // Random delay between 200ms and 800ms for realistic feel
          const delay = Math.random() * 600 + 200;
          setTimeout(updateProgress, delay);
        }
      }

      function updateTip() {
        const tipContent = document.getElementById('tip-content');
        if (!tipContent) return; // Guard against null
        
        currentTipIndex = (currentTipIndex + 1) % tips.length;
        
        // Fade out
        tipContent.style.opacity = '0';
        tipContent.style.transition = 'opacity 0.3s ease';
        
        setTimeout(() => {
          if (tipContent) {
            tipContent.textContent = tips[currentTipIndex];
            // Fade in
            tipContent.style.opacity = '1';
          }
        }, 300);
      }

      document.addEventListener('DOMContentLoaded', () => {
        // Set initial tip
        const tipContent = document.getElementById('tip-content');
        if (tipContent) {
          tipContent.textContent = tips[currentTipIndex];
        }
        
        // Start progress animation after DOM is ready
        setTimeout(updateProgress, 500);

        // Cycle tips after DOM is ready
        setInterval(updateTip, TIP_DURATION);

        // Click to change tip
        document.addEventListener('click', updateTip);
        
        // Auto-hide after 15 seconds max
        setTimeout(() => {
          const spinnerContainer = document.querySelector('.spinner-container');
          if (spinnerContainer) {
            // Fade out the spinner container itself (which has proper background)
            spinnerContainer.style.opacity = '0';
            spinnerContainer.style.transition = 'opacity 0.5s ease';
            spinnerContainer.style.pointerEvents = 'none';
            setTimeout(() => {
              spinnerContainer.style.display = 'none';
            }, 500);
          }
        }, 15000);
      });
    </script>
